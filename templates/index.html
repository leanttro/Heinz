<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heinz | A Maionese Feita com Tempo (Estilo Final)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #FF7661 0%, #FF1E1E 30%, #1E3FFF 100%);
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            height: 200vh; /* Garante que haja scroll para as animações */
        }

        h1, h2 {
            font-family: 'Bebas Neue', cursive;
        }

        #three-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
        }

        .content-section {
            position: relative;
            z-index: 20;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        #scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }

        /* Classes de utilidade para garantir visibilidade */
        .title-main {
            font-size: clamp(5rem, 15vw, 12rem);
            line-height: 0.8;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div id="three-container"></div>

    <section class="content-section" id="hero">
        <h1 id="hero-title" class="title-main font-bold tracking-tighter opacity-0">HEINZ</h1>
        <p id="hero-subtitle" class="text-xl md:text-2xl uppercase tracking-[0.3em] font-light opacity-0">A Maionese Feita com Tempo</p>
        
        <div id="scroll-indicator" class="opacity-50">
            <p class="text-xs tracking-widest uppercase">Deslize para baixo</p>
            <div class="w-[1px] h-12 bg-white mx-auto mt-2"></div>
        </div>
    </section>

    <section class="content-section" id="details">
        <div class="max-w-4xl">
            <h2 class="text-6xl md:text-8xl mb-6">TEXTURA INCOMPARÁVEL</h2>
            <p class="text-lg md:text-xl leading-relaxed opacity-80 font-light">
                Cada pote de Heinz é o resultado de um processo cuidadoso, onde o tempo é o ingrediente principal para atingir a cremosidade perfeita que você já conhece e confia.
            </p>
        </div>
    </section>

    <script>
        // --- 1. CONFIGURAÇÃO DO CENÁRIO THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true,
            powerPreference: "high-performance"
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('three-container').appendChild(renderer.domElement);

        // --- 2. ILUMINAÇÃO ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        const topLight = new THREE.DirectionalLight(0xffffff, 1);
        topLight.position.set(0, 5, 0);
        scene.add(topLight);

        // --- 3. CARREGAMENTO DO POTE (GLB) ---
        let poteModel;
        const loader = new THREE.GLTFLoader();
        
        // Caminho obrigatório para funcionar com o seu app.py e Docker
        loader.load('/static/pote_maionese.glb.glb', function(gltf) {
            poteModel = gltf.scene;
            
            // Centraliza o modelo dentro do seu próprio eixo
            const box = new THREE.Box3().setFromObject(poteModel);
            const center = box.getCenter(new THREE.Vector3());
            poteModel.position.sub(center);
            
            // Cria um grupo para facilitar a manipulação GSAP
            const group = new THREE.Group();
            group.add(poteModel);
            scene.add(group);
            
            // Escala inicial
            group.scale.set(3.5, 3.5, 3.5);
            group.position.y = 0;

            // Integração com GSAP após carregar
            initAnimations(group);
            
        }, undefined, function(error) {
            console.error('Erro crítico no carregamento do arquivo 3D:', error);
        });

        camera.position.z = 5;

        // --- 4. ANIMAÇÕES GSAP ---
        function initAnimations(modelGroup) {
            gsap.registerPlugin(ScrollTrigger);

            // Timeline de entrada
            const masterTl = gsap.timeline();
            
            masterTl.to("#hero-title", { 
                opacity: 1, 
                y: -30, 
                duration: 1.5, 
                ease: "expo.out" 
            });
            
            masterTl.to("#hero-subtitle", { 
                opacity: 1, 
                y: -15, 
                duration: 1.2, 
                ease: "power2.out" 
            }, "-=1");

            // Rotação contínua e reação ao Scroll
            gsap.to(modelGroup.rotation, {
                y: Math.PI * 2,
                scrollTrigger: {
                    trigger: "body",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.5
                }
            });

            // Movimentação para a lateral na segunda seção
            gsap.to(modelGroup.position, {
                x: -2.5,
                y: 0.5,
                scrollTrigger: {
                    trigger: "#details",
                    start: "top bottom",
                    end: "top center",
                    scrub: 1
                }
            });

            // Mudança de escala no scroll
            gsap.to(modelGroup.scale, {
                x: 2,
                y: 2,
                z: 2,
                scrollTrigger: {
                    trigger: "#details",
                    start: "top bottom",
                    end: "top center",
                    scrub: 1
                }
            });
        }

        // --- 5. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotação suave constante (idle)
            if (poteModel) {
                poteModel.rotation.y += 0.003;
            }
            
            renderer.render(scene, camera);
        }

        animate();

        // --- 6. REDIMENSIONAMENTO ---
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>
</html>
