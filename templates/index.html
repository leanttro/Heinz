<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Heinz Crochê | A Maionese Feita com Tempo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at center, #FF7661 0%, #FF1E1E 30%, #1E3FFF 100%);
        font-family: 'Montserrat', sans-serif;
        color: white;
        overflow-x: hidden;
    }
    h1, h2 {
        font-family: 'Bebas Neue', cursive;
        letter-spacing: -0.02em;
        text-transform: uppercase;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #FF1E1E; border-radius: 4px; }
    #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        pointer-events: none;
    }
    .content {
        position: relative;
        z-index: 2;
    }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div class="content w-full h-screen flex items-center justify-center pointer-events-none">
    <h1 class="text-6xl md:text-9xl text-center drop-shadow-2xl">A MAIONESE FEITA<br>COM TEMPO</h1>
</div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    let poteWrapper = null;
    const yarnMesh = new THREE.Group();
    scene.add(yarnMesh);

    let mouseX = 0;
    let mouseY = 0;
    document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    const textureLoader = new THREE.TextureLoader();

    const texturaTampa = textureLoader.load('/static/textura_tampa.png');
    texturaTampa.flipY = false;

    const texturaCorpoBege = textureLoader.load('/static/textura_corpo_bege.png');
    texturaCorpoBege.flipY = false;

    const texturaCroche = textureLoader.load('/static/textura_croche.png');
    texturaCroche.flipY = false;

    const texturaRotuloFrente = textureLoader.load('/static/rotulo_frente.png');
    texturaRotuloFrente.flipY = false;

    const texturaRotuloVerso = textureLoader.load('/static/rotulo_verso.png');
    texturaRotuloVerso.flipY = false;

    const loader = new THREE.GLTFLoader();
    loader.load('/static/pote_maionese.glb.glb', function(gltf) {
        const model = gltf.scene;

        model.traverse(function(child) {
            if (child.isMesh) {
                console.log(child.name);

                child.material.transparent = true;
                child.material.alphaTest = 0.5;

                const name = child.name.toLowerCase();

                if (name.includes('tampa') || name.includes('lid')) {
                    child.material.map = texturaTampa;
                } else if (name.includes('croche') || name.includes('yarn')) {
                    child.material.map = texturaCroche;
                } else if (name.includes('frente') || name.includes('front') || name.includes('rotulo_frente')) {
                    child.material.map = texturaRotuloFrente;
                } else if (name.includes('verso') || name.includes('back') || name.includes('rotulo_verso')) {
                    child.material.map = texturaRotuloVerso;
                } else if (name.includes('corpo') || name.includes('body') || name.includes('pote')) {
                    child.material.map = texturaCorpoBege;
                }

                child.material.needsUpdate = true;
            }
        });

        scene.add(model);
        poteWrapper = model;
    });

    const particleCount = 200;
    const particles = new THREE.BufferGeometry();
    const pMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.05,
        transparent: true,
        opacity: 0.8
    });
    
    const pPositions = new Float32Array(particleCount * 3);
    for(let i = 0; i < particleCount * 3; i++) {
        pPositions[i] = (Math.random() - 0.5) * 10;
    }
    particles.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
    const particleSystem = new THREE.Points(particles, pMaterial);
    scene.add(particleSystem);

    function animateParticles() {
        const positions = particleSystem.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            positions[i*3+1] += 0.003;
            if (positions[i*3+1] > 4.5) positions[i*3+1] = -1.5;
            positions[i*3] += (Math.random() - 0.5) * 0.01;
            positions[i*3+2] += (Math.random() - 0.5) * 0.01;
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    function animate() {
        requestAnimationFrame(animate);
        if (poteWrapper) {
            poteWrapper.rotation.x += (mouseY * 0.15 - poteWrapper.rotation.x) * 0.05;
            poteWrapper.position.x += (mouseX * 0.6 - poteWrapper.position.x) * 0.05;
            yarnMesh.position.x = poteWrapper.position.x;
            yarnMesh.rotation.x = poteWrapper.rotation.x;
            yarnMesh.rotation.y = poteWrapper.rotation.y;
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
